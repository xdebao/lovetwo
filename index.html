<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 来自一封神秘的表白信 💕</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: "微软雅黑", sans-serif;
            overflow: hidden;
        }

        canvas {
            margin-bottom: 20px;
        }

        .text {
            color: #800f2f;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #ok-btn {
            background-color: #ff758f;
            color: white;
        }

        #ok-btn:hover {
            background-color: #ff4d6d;
        }

        #cancel-btn {
            background-color: #ffccd5;
            color: #800f2f;
        }

        #cancel-btn:hover {
            background-color: #fff0f3;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas" width="300" height="200"></canvas>

    <div class="text">我喜欢你，做我女朋友好吗？</div>

    <div class="btn-container">
        <button id="ok-btn">好呀</button>
        <button id="cancel-btn">不要</button>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const okBtn = document.getElementById('ok-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        let heartSize = 10;
        let heartGrowing = true;
        let refuseCount = 0;
        
        // 初始按钮尺寸
        let okBtnWidth = 100; 
        let okBtnHeight = 50;

      

        

        function agree() {
            alert("❤️ 太棒了！那我们在一起吧～\n(っ˘з(˘⌣˘ ) ♡");
            // 点击同意后可以禁用按钮或做其他操作
            okBtn.disabled = true;
            cancelBtn.disabled = true;
        }

        function refuse() {
            refuseCount++;
            
            // 递进文案
            if (refuseCount === 1) {
                alert("😶 ...你认真的吗？");
            } else if (refuseCount === 2) {
                alert("🥺 要不再想想？");
            } else if (refuseCount === 3) {
                alert("😤 不许选这个！");
            } else if (refuseCount === 4) {
                alert("😭 我会很伤心的...");
            } else {
                alert("🥺 再考虑一下嘛～");
            }

            // 让按钮变大
            okBtnWidth += 30;
            okBtnHeight += 10;
            okBtn.style.width = okBtnWidth + "px";
            okBtn.style.height = okBtnHeight + "px";
            okBtn.style.fontSize = (18 + refuseCount * 2) + "px";
        }

        // 绑定事件
        okBtn.addEventListener('click', agree);
        cancelBtn.addEventListener('click', refuse);

        // 启动动画
        pulseHeart();
    </script>
</body>

</html>
